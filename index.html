<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Utilization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="member-card">

    <!-- Loading / error / empty states. Shown by default, hidden once real data renders. -->
    <div class="state-box" id="state-box">
      <strong id="state-title">Loading…</strong>
      <span id="state-message">Fetching your availment history…</span>
    </div>

    <!-- Main content. Hidden until loadMember() fills it in and reveals it. -->
    <div id="card-content" class="hidden">

      <div class="card-header">
        <h1 class="member-name" id="member-name">—</h1>
        <p class="member-subline" id="member-subline">—</p>
      </div>

      <div class="availments-section">
        <p class="eyebrow">Availments Reported — <span id="year">—</span></p>

        <div class="total-row">
          <span class="total-number" id="total-number">0</span>
          <span class="total-label">total this year</span>
        </div>

        <div class="category-grid">
          <div class="category-card">
            <div class="category-label">OPD/IPD</div>
            <div class="category-count" id="count-opd-ipd">0</div>
          </div>
          <div class="category-card">
            <div class="category-label">Dental</div>
            <div class="category-count" id="count-dental">0</div>
          </div>
          <div class="category-card">
            <div class="category-label">Reimbursement</div>
            <div class="category-count" id="count-reimbursement">0</div>
          </div>
          <div class="category-card">
            <div class="category-label">APE/ECU</div>
            <div class="category-count" id="count-ape-ecu">0</div>
          </div>
        </div>
      </div>

      <div class="footnote">Based on benefit-related requests submitted under this email address.</div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
